# Render blueprint — provisions a free Postgres + a single Docker web service
# that serves the API and the built frontend from one origin.
# Deploy: push to GitHub, then Render → New → Blueprint → pick this repo.

databases:
  - name: cleardesk-db
    plan: free
    databaseName: cleardesk
    user: cleardesk

services:
  - type: web
    name: cleardesk
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cleardesk-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      - key: AUTO_SEED
        value: "true"
      - key: LLM_PROVIDER
        value: mock                  # change to "gemini" + add GEMINI_API_KEY for real reads
      # Optional — uncomment/set in the dashboard to enable real document reading:
      # - key: GEMINI_API_KEY
      #   sync: false
